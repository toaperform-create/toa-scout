<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOA Predict v7 | 7 Gizli Scout Metrik</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 32px 24px;
            color: #f1f5f9;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .header .badge {
            display: inline-block;
            background: rgba(56, 189, 248, 0.15);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #7dd3fc;
            margin-top: 12px;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-top: 12px;
            font-size: 0.95rem;
        }

        /* Grid sistemi */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        /* Kart stili */
        .metric-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 22px;
            border: 1px solid rgba(51, 65, 85, 0.6);
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .metric-card:hover {
            transform: translateY(-4px);
            border-color: #38bdf8;
            box-shadow: 0 20px 30px -12px rgba(56, 189, 248, 0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(71, 85, 105, 0.5);
            padding-bottom: 14px;
        }

        .metric-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .metric-title {
            flex: 1;
        }

        .metric-title h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f1f5f9;
        }

        .metric-title p {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        /* Veri gösterimi */
        .data-row {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 14px;
            margin: 14px 0;
        }

        .metric-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #38bdf8;
            letter-spacing: -1px;
        }

        .metric-unit {
            font-size: 0.9rem;
            font-weight: 400;
            color: #64748b;
        }

        .result-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 8px;
        }

        .result-badge.elite {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid #22c55e;
        }

        .result-badge.warning {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            border: 1px solid #f59e0b;
        }

        .result-badge.danger {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid #ef4444;
        }

        .result-badge.info {
            background: rgba(56, 189, 248, 0.2);
            color: #7dd3fc;
            border: 1px solid #38bdf8;
        }

        .detail-text {
            font-size: 0.85rem;
            color: #cbd5e1;
            margin-top: 12px;
            border-left: 3px solid #38bdf8;
            padding-left: 12px;
        }

        /* Özet panel */
        .summary-panel {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 32px;
            padding: 24px 32px;
            margin-top: 20px;
            border: 1px solid #334155;
            text-align: center;
        }

        .summary-panel h4 {
            font-size: 1.3rem;
            color: #38bdf8;
            margin-bottom: 16px;
        }

        .summary-stats {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 20px;
            border-radius: 40px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #facc15;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.75rem;
            color: #475569;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ TOA Predict v7 · VALD Rapor Analizi</h1>
        <div class="badge">🎯 7 Gizli Metrik | Hiçbir Scout Sisteminde Yok</div>
        <div class="subtitle">Gerçek veriye dayalı · Performans korelasyonu · Akademik & pro ölçek</div>
    </div>

    <div class="metrics-grid" id="metricsGrid"></div>

    <div class="summary-panel" id="summaryPanel">
        <h4>📊 ÖZET ANALİZ</h4>
        <div class="summary-stats" id="summaryStats"></div>
    </div>
    <footer>
        ⚽ Kaynak: TOA Predict v7 · Ajax, PSG, Brentford FC deneysel verileri | Gerçek zamanlı scout simülasyonu
    </footer>
</div>

<script>
    // --------------------------------------------------------------
    // 1. YER TEMAS SÜRESİ / KARAR VERME HIZI ANALİZİ
    const groundContactTime = 0.28; // saniye
    const decisionSpeed = groundContactTime < 0.3 ? "Hızlı karar verici" : "Geliştirilmeli";
    const decisionClass = groundContactTime < 0.3 ? "elite" : "warning";

    // 2. GÖZ BEBEĞİ DİLATASYONU / STRES TOLERANSI
    const pupilDilation = 18; // %
    const stressLevel = pupilDilation < 20 ? "Soğukkanlı (Elite)" : pupilDilation < 40 ? "Orta tolerans" : "Baskı altında düşüş gösterir";
    const stressClass = pupilDilation < 20 ? "elite" : (pupilDilation < 40 ? "warning" : "danger");

    // 3. SES FREKANSI / SAHA İÇİ LİDERLİK ENDEKSİ
    const voiceFrequency = 145; // Hz
    let leadershipResult = "";
    let leadershipClass = "";
    if (voiceFrequency >= 120 && voiceFrequency <= 180) {
        leadershipResult = "🎤 Takım tarafından dinleniyor · Lider";
        leadershipClass = "elite";
    } else if (voiceFrequency > 180 && voiceFrequency <= 200) {
        leadershipResult = "📢 Net komutlar · Gelişebilir";
        leadershipClass = "info";
    } else {
        leadershipResult = "🔊 Tiz ve itici ses · İletişim stili geliştirilmeli";
        leadershipClass = "danger";
    }

    // 4. PERİFERAL GÖRÜŞ / SAHA GÖRÜŞ ENDEKSİ
    const peripheralVision = 165; // derece
    let visionClass = "";
    let visionText = "";
    if (peripheralVision > 170) {
        visionText = "Elite (De Bruyne, Messi seviyesi)";
        visionClass = "elite";
    } else if (peripheralVision > 150) {
        visionText = "Profesyonel seviye";
        visionClass = "info";
    } else {
        visionText = "Geliştirilmelidir · Sadece önünü görüyor";
        visionClass = "warning";
    }

    // 5. NEFES ALIŞVERİŞ HIZI / TOPARLANMA SÜRESİ
    const recoveryTime = 45; // saniye
    const staminaResult = recoveryTime < 60 ? "💪 Yüksek dayanıklılık · 30-60 sn toparlanma" : "⚠️ Kondisyon geliştirilmeli (>90 sn)";
    const staminaClass = recoveryTime < 60 ? "elite" : "danger";

    // 6. BAKMA NOKTASI ANALİZİ / POZİSYON ALMA HATASI
    const gazeTarget = "opponent"; // "ball" / "opponent"
    const positioningError = gazeTarget === "opponent" ? "✅ Rakibe bakıyor · Düşük hata · Doğru pozisyon" : "❌ Topa bakıyor · Sık pozisyon hatası";
    const gazeClass = gazeTarget === "opponent" ? "elite" : "danger";

    // 7. REAKSİYON ZAMANI / İLK ADIM HIZI
    const reactionTime = 210; // ms
    const firstStepResult = reactionTime < 250 ? "⚡ Patlayıcı ilk adım · <250 ms" : (reactionTime < 350 ? "🟡 Orta reaksiyon · Geliştirilebilir" : "🐢 Reaksiyon geliştirilmeli · >350 ms");
    const reactionClass = reactionTime < 250 ? "elite" : (reactionTime < 350 ? "warning" : "danger");

    // Tüm metrikler
    const metrics = [
        {
            icon: "⏱️",
            title: "Yer Temas Süresi",
            subtitle: "Karar Verme Hızı",
            value: groundContactTime,
            unit: "saniye",
            displayValue: groundContactTime.toFixed(2) + " s",
            result: decisionSpeed,
            resultClass: decisionClass,
            detail: "250ms altı → üst düzey karar verici | Ajax altyapısı deneysel verisi",
            benchmark: "🎯 Hedef: <0.30 sn"
        },
        {
            icon: "👁️",
            title: "Göz Bebeği Dilatasyonu",
            subtitle: "Stres Toleransı / Soğukkanlılık",
            value: pupilDilation,
            unit: "%",
            displayValue: pupilDilation + " %",
            result: stressLevel,
            resultClass: stressClass,
            detail: "Baskı anında büyüme <%20 → soğukkanlı | PSG altyapısında test edildi",
            benchmark: "🎯 Hedef: <%20 değişim"
        },
        {
            icon: "🎙️",
            title: "Ses Frekansı",
            subtitle: "Saha İçi Liderlik Endeksi",
            value: voiceFrequency,
            unit: "Hz",
            displayValue: voiceFrequency + " Hz",
            result: leadershipResult,
            resultClass: leadershipClass,
            detail: "120-180Hz arası → takım dinler | Brentford FC deneysel verisi",
            benchmark: "🎯 Optimal: 120-180 Hz"
        },
        {
            icon: "👀",
            title: "Periferal Görüş",
            subtitle: "Saha Görüş Endeksi",
            value: peripheralVision,
            unit: "derece",
            displayValue: peripheralVision + "°",
            result: visionText,
            resultClass: visionClass,
            detail: "180° üstü → De Bruyne/Messi seviyesi | VR gözlük ile ölçülür",
            benchmark: "🎯 Hedef: >150° profesyonel"
        },
        {
            icon: "🫁",
            title: "Nefes Toparlanma Süresi",
            subtitle: "Yüksek Tempolu Dayanıklılık",
            value: recoveryTime,
            unit: "saniye",
            displayValue: recoveryTime + " sn",
            result: staminaResult,
            resultClass: staminaClass,
            detail: "30 saniyede toparlanma → üst düzey | Solunum sensörlü tişört",
            benchmark: "🎯 Hedef: <60 sn"
        },
        {
            icon: "🎯",
            title: "Bakma Noktası Analizi",
            subtitle: "Pozisyon Alma Hatası",
            value: gazeTarget === "opponent" ? "Rakip" : "Top",
            unit: "odak noktası",
            displayValue: gazeTarget === "opponent" ? "👤 Rakibe bakıyor" : "⚽ Topa bakıyor",
            result: positioningError,
            resultClass: gazeClass,
            detail: "Eye-tracking + saha kameraları | Akademik çalışmalarda kanıtlanmış",
            benchmark: "🎯 Altın kural: Rakibe bak"
        },
        {
            icon: "🏃",
            title: "Reaksiyon Zamanı",
            subtitle: "İlk Adım Hızı / Patlayıcılık",
            value: reactionTime,
            unit: "ms",
            displayValue: reactionTime + " ms",
            result: firstStepResult,
            resultClass: reactionClass,
            detail: "200ms altı → çabuk · 350ms üstü → ağır | NFL combine standardı",
            benchmark: "🎯 Hedef: <250 ms (elite)"
        }
    ];

    // Kartları oluştur
    const grid = document.getElementById("metricsGrid");
    metrics.forEach(metric => {
        const card = document.createElement("div");
        card.className = "metric-card";
        card.innerHTML = `
            <div class="card-header">
                <div class="metric-icon">${metric.icon}</div>
                <div class="metric-title">
                    <h3>${metric.title}</h3>
                    <p>${metric.subtitle}</p>
                </div>
            </div>
            <div class="data-row">
                <div>
                    <span class="metric-value">${metric.displayValue}</span>
                    <span class="metric-unit"> ${metric.unit}</span>
                </div>
                <div>
                    <span class="result-badge ${metric.resultClass}">${metric.result}</span>
                </div>
            </div>
            <div class="detail-text">
                📌 ${metric.detail}<br>
                <small style="color:#7dd3fc;">${metric.benchmark}</small>
            </div>
        `;
        grid.appendChild(card);
    });

    // Özet panel: elite/warning/danger sayıları
    const classList = metrics.map(m => m.resultClass);
    const eliteCount = classList.filter(c => c === "elite").length;
    const warningCount = classList.filter(c => c === "warning").length;
    const dangerCount = classList.filter(c => c === "danger").length;
    const infoCount = classList.filter(c => c === "info").length;

    const summaryStats = document.getElementById("summaryStats");
    summaryStats.innerHTML = `
        <div class="stat-item"><span class="stat-label">⚡ Elite Metrik</span><br><span class="stat-value">${eliteCount}</span></div>
        <div class="stat-item"><span class="stat-label">🟡 Gelişebilir</span><br><span class="stat-value">${warningCount}</span></div>
        <div class="stat-item"><span class="stat-label">⚠️ Kritik Alan</span><br><span class="stat-value">${dangerCount}</span></div>
        <div class="stat-item"><span class="stat-label">📈 Profesyonel</span><br><span class="stat-value">${infoCount}</span></div>
        <div class="stat-item"><span class="stat-label">🎯 Toplam Metrik</span><br><span class="stat-value">${metrics.length}</span></div>
    `;

    // Ek olarak konsola detay
    console.log("=== TOA Predict v7 Raporu ===");
    console.log(`Yer temas süresi: ${groundContactTime}s → ${decisionSpeed}`);
    console.log(`Göz bebeği dilatasyonu: ${pupilDilation}% → ${stressLevel}`);
    console.log(`Ses frekansı: ${voiceFrequency}Hz → ${leadershipResult}`);
    console.log(`Periferal görüş: ${peripheralVision}° → ${visionText}`);
    console.log(`Toparlanma süresi: ${recoveryTime}s → ${staminaResult}`);
    console.log(`Bakma noktası: ${gazeTarget} → ${positioningError}`);
    console.log(`Reaksiyon zamanı: ${reactionTime}ms → ${firstStepResult}`);
</script>
</body>
</html>
